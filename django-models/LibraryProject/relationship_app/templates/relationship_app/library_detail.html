{% extends "relationship_app/base.html" %}

{% block title %}Library: {{ library.name }}{% endblock %}

{% block content %}
<h2>Library: {{ library.name }}</h2>
<h3>Books in this Library:</h3>
<ul>
    {% for book in library.books.all %}
    <li>{{ book.title }} by {{ book.author.name }}</li>
    {% endfor %}
</ul>
{% endblock %}
