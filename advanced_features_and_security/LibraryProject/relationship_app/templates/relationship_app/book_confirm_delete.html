{% extends "relationship_app/base.html" %}

{% block title %}Delete Book{% endblock %}

{% block content %}
<h1>Delete Book</h1>
<p>Are you sure you want to delete "{{ book.title }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Confirm Delete</button>
    <a href="{% url 'list_books' %}">Cancel</a>
</form>
{% endblock %}
